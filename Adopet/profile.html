<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adotpet - Perfil</title>
    <link rel="stylesheet" href="styles/cabecalho.css">
    <link rel="stylesheet" href="styles/rodape.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/perfil-principal.css">
</head>
<body>
    <header class="cabecalho">
        <div class="background bg-0"></div>
        <nav class="cabecalho__menu">
            <ul class="menu__links">
                <li class="menu__links--link">
                    <a href="home.html"><img src="assets/icons/home-icon.svg" alt=""></a>
                </li>
                <li class="menu__links--link">
                    <a href="message.html"><img src="assets/icons/message-icon.svg" alt=""></a>
                </li>
            </ul>
        </nav>
        <a class="cabecalho__link-perfil" href="landing.html"><img class="user-icon" src="assets/icons/user-icon.svg" alt=""></a>
    </header>
    <main class="principal">
        <div class="background bg-1"></div>
        <div class="principal--container">
            <p class="principal__texto">Esse é o perfil que aparece para responsáveis ou ONGs que recebem sua mensagem.</p>
            <form class="principal__formulario" action="">
                <h2 class="formulario__titulo">Perfil</h2>
                <label class="formulario__legenda" for="POST-foto">Foto</label>
                <div id="POST-foto" class="input--container">
                    <label class="image-area" for="escolhe-foto-de-perfil"><img class="imagem-de-perfil" src="assets/images/1631750977862.jpeg" alt="Sua foto de perfil" onerror="this.src='assets/icons/user-icon.svg'"></label>
                    <input id="escolhe-foto-de-perfil" class="escolhe-foto" type="file" accept="image/png, image/jpeg">
                    <p class="editar-imagem--texto">Clique na foto para editar</p>
                </div>
                <label class="formulario__legenda" for="POST-nome">Nome</label>
                <input class="formulario__dados" type="text" id="POST-nome" placeholder="Insira seu nome completo">
                <label class="formulario__legenda" for="POST-telefone">Telefone</label>
                <input class="formulario__dados" type="text" id="POST-telefone" placeholder="Insira seu telefone e/ou whatsapp">
                <label class="formulario__legenda" for="POST-cidade">Cidade</label>
                <input class="formulario__dados" type="text" id="POST-nome_pet" placeholder="Insira sua cidade">
                <label class="formulario__legenda" for="POST-sobre">Sobre</label>
                <textarea class="formulario__dados" id="POST-sobre" cols="30" rows="10" placeholder="Escreva sua mensagem."></textarea>
                <input class="formulario__botao" type="submit" value="Enviar">
        </div>
    </main>
    <footer class="rodape">
        <p>2022 - Desenvolvido por Alura.</p>
    </footer>
</body>
</html>
