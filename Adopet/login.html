<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopet - Login</title>
    <link rel="stylesheet" href="styles/cabecalho.css">
    <link rel="stylesheet" href="styles/rodape.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/logar-principal.css">
</head>
<body>
    <header class="cabecalho">
        <div class="background bg-0"></div>
        <nav class="cabecalho__menu">
            <ul class="menu__links">
                <li class="menu__links--link">
                    <a href="#"><img src="assets/icons/home-icon.svg" alt=""></a>
                </li>
                <li class="menu__links--link">
                    <a href="message.html"><img src="assets/icons/message-icon.svg" alt=""></a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="principal">
        <div class="background bg-1"></div>
        <div class="background bg-2"></div>
        <div class="principal--container">
            <img class="principal__logo" src="assets/images/adopet-logo__blue.svg" alt="Logo da Adopet">
            <p class="principal__texto">Já tem conta? Faça seu login:</p>
            <form class="principal__formulario" action="">
                <label class="formulario__legenda" for="POST-email">Email</label>
                <input minlength="3" maxlength="254" class="formulario__dados" type="text" id="POST-email" placeholder="Insira seu email">
                <label class="formulario__legenda" for="POST-senha">Senha</label>
                <div class="input--container">
                    <input class="formulario__dados formulario--senha" type="password" minlength="8" maxlength="16" id="POST-senha" placeholder="Crie uma senha">
                    <svg class="icone__alternar-visibilidade" width="18" height="17" viewBox="0 0 18 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path id="alterar-visibilidade__senha" d="M12.0477 9.73811L11.1477 8.86112C11.5023 7.91769 11.3182 7.13372 10.5955 6.5092C9.87273 5.88467 9.08864 5.72522 8.24318 6.03084L7.34318 5.15385C7.575 5.00769 7.83409 4.90138 8.12045 4.83494C8.40682 4.76851 8.7 4.73529 9 4.73529C9.96818 4.73529 10.7898 5.06416 11.4648 5.7219C12.1398 6.37964 12.4773 7.18023 12.4773 8.12365C12.4773 8.41598 12.4398 8.70499 12.3648 8.99068C12.2898 9.27636 12.1841 9.52551 12.0477 9.73811ZM14.6864 12.3093L13.8682 11.512C14.5364 11.0337 15.1193 10.4988 15.617 9.90753C16.1148 9.31622 16.4795 8.7216 16.7114 8.12365C16.0295 6.64872 15.0068 5.48272 13.6432 4.62566C12.2795 3.76861 10.8 3.34008 9.20455 3.34008C8.63182 3.34008 8.04545 3.39323 7.44545 3.49953C6.84545 3.60583 6.375 3.73207 6.03409 3.87823L5.09318 2.94145C5.57045 2.72884 6.18068 2.54282 6.92386 2.38336C7.66705 2.22391 8.39318 2.14418 9.10227 2.14418C11.0523 2.14418 12.8352 2.68566 14.4511 3.76861C16.067 4.85155 17.25 6.30324 18 8.12365C17.6455 8.97407 17.1886 9.7514 16.6295 10.4556C16.0705 11.1599 15.4227 11.7778 14.6864 12.3093ZM15.8727 16.8138L12.4364 13.5251C11.9591 13.7111 11.4205 13.854 10.8205 13.9536C10.2205 14.0533 9.61364 14.1031 9 14.1031C7.00909 14.1031 5.20227 13.5616 3.57955 12.4787C1.95682 11.3958 0.763636 9.94407 0 8.12365C0.272727 7.43269 0.651136 6.75834 1.13523 6.1006C1.61932 5.44286 2.20909 4.81501 2.90455 4.21707L0.327273 1.70569L1.18636 0.848633L16.6705 15.9368L15.8727 16.8138ZM3.74318 5.05419C3.23864 5.41296 2.75114 5.88467 2.28068 6.46933C1.81023 7.05399 1.47273 7.60543 1.26818 8.12365C1.96364 9.59859 3.01023 10.7646 4.40795 11.6216C5.80568 12.4787 7.39091 12.9072 9.16364 12.9072C9.61364 12.9072 10.0568 12.8807 10.4932 12.8275C10.9295 12.7743 11.2568 12.6946 11.475 12.5883L10.1659 11.3127C10.0159 11.3791 9.83182 11.429 9.61364 11.4622C9.39545 11.4954 9.19091 11.512 9 11.512C8.04545 11.512 7.22727 11.1865 6.54545 10.5354C5.86364 9.88427 5.52273 9.08037 5.52273 8.12365C5.52273 7.92434 5.53977 7.72502 5.57386 7.52571C5.60795 7.32639 5.65909 7.14701 5.72727 6.98755L3.74318 5.05419Z" fill="#999999"/>
                        </svg>
                </div>
                <a class="formulario__esqueci-minha-senha" href="#">Esqueci minha senha.</a>
                <input class="formulario__botao" type="submit" value="Entrar">
            </form>
        </div>
    </main>
    <footer class="rodape">
        <p>2022 - Desenvolvido por Alura.</p>
    </footer>
</body>
</html>
